name: CI

on:
  push:
    branches: [main]
  pull_request:

# Needed by nrwl/nx-set-shas to read previous successful workflow runs.
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `nx affected` can diff against the base SHA.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Derives the correct base/head SHAs for `nx affected` on push and PR.
      - uses: nrwl/nx-set-shas@v4

      # Nx Cloud: distribute tasks across agents and share the remote cache.
      - run: pnpm exec nx-cloud start-ci-run --distribute-on="3 linux-medium" --stop-agents-after="build"

      # Only build/lint/test the projects affected by this change.
      # `size-check` is inferred on any project with a size-budget.json and
      # runs after build, failing the pipeline if a bundle blows its budget.
      - run: pnpm exec nx affected -t lint test build size-check --parallel=3
