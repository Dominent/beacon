name: CI

on:
  push:
    branches: [main]
  pull_request:

# Needed by nrwl/nx-set-shas to read previous successful workflow runs.
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `nx affected` can diff against the base SHA.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Derives the correct base/head SHAs for `nx affected` on push and PR.
      - uses: nrwl/nx-set-shas@v4

      # Nx Cloud: distribute affected tasks across 3 managed agents (DTE) + share
      # the remote cache. `linux-medium-js` is a predefined Nx Cloud launch
      # template that checks out and installs (pnpm) on each agent.
      - run: pnpm exec nx-cloud start-ci-run --distribute-on="3 linux-medium-js"

      # Only build/lint/test the projects affected by this change.
      # `size-check` is inferred on any project with a size-budget.json and
      # runs after build, failing the pipeline if a bundle blows its budget.
      - run: pnpm exec nx affected -t lint stylelint test build size-check --parallel=3

  # Playwright e2e runs in its own job (its webServer starts the API + app).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec nx e2e beacon-e2e
